<style>
.app-coninput {
	display: grid;
	grid-template: auto / 70px 500px 80px 80px;

	padding: 6px 12px;
	gap: 4px;
	background-color: rgb(60, 60, 60);

<style>

	padding: 0;
	margin: 0;
	width: 100%;
	height: 100%;
	overflow: hidden;
}
.app-main {
	display: grid;
	grid-template: 42px calc(100% - 42px) / auto;
}

.app-main > .h {

	background-color: rgb(60, 60, 60);

	padding: 2px 0;

	display: grid;
	grid-template: auto / 200px auto 160px;
}
.app-main > .h > .logo {

	user-select: none;
	text-transform: uppercase;
	font-weight: lighter;

}
.app-main > .h button {

}
.app-main > .h input {
	width: 400px;
	margin: 4px 2px;
}
.app-main > .h > div {
	display: flex;
}

.app-main > .m {
	color: rgb(204, 204, 204);
	background-color: rgb(30, 30, 30);

	display: grid;
	grid-template: 100% / 200px auto;
}
.app-main > .m > .m2 {
	display: grid;
	grid-template: calc(100% - 42px) 42px / auto;
}
</style>
<style>

}

<style>

<style>

<body>

<template id="app-coninput">
	<div class="app-coninput">
		<span>Console:</span>
		<input
			type="text"
			v-model="input"
			@keyup.enter="submit"
			@keyup.up="historyNav(-1)"
			@keyup.down="historyNav(1)"
			:disabled="disabled">
		<button @click="submit" :disabled="disabled">Submit</button>
		<button @click="exit" :disabled="disabled">Exit</button>
	</div>
</template>
<template id="app-main">
	<div class="app-main">
		<div class="h">
			<div class="logo">Aurascope</div>
			<div>
				<input type="text" v-model="conn.address" @keydown.enter="connect()" :readonly="socket != null" :disabled="socket != null">
				<widget-button v-if="socket == null" @click="connect()" icon="icon-power" label="Connect"></widget-button>
				<widget-button v-if="socket != null" @click="disconnect()" icon="icon-power" label="Disconnect"></widget-button>
			</div>
			<div>
				<widget-button v-if="conn.paused" @click="conn.paused = false;" icon="icon-play" label="Play"></widget-button>
				<widget-button v-if="!conn.paused" @click="conn.paused = true;" icon="icon-pause" label="Pause"></widget-button>
				<widget-button @click="clear()" icon="icon-clear" label="Clear"></widget-button>
			</div>
		</div>
		<div class="m">
			<app-sidebar :topics="pageTitles" @select-topic="changeCurrentPage"></app-sidebar>
			<div class="m2">
				<panel-xss v-if="currentPage in pages" :html="pages[currentPage]"></panel-xss>
				<panel-console v-else :lines="consoleLines"></panel-console>
				<app-coninput @submit="consoleInput" @clear="consoleClear" :disabled="!conn.ready"></app-coninput>
			</div>
		</div>
	</div>
</template>
<template id="app-sidebar">
	<div class="app-sidebar">
		<div v-for="topic in topics" @click="selectTopic(topic)" @wheel="selectTopic(topic)" class="clicky" :class="{ 'selected': selectedTopic == topic }">
			{{ topic }}
		</div>
	</div>
</template>

</template>

<template id="panel-console">
	<div class="panel-console" ref="consoleRef" @copy="copyEvent">
		<pre class="lines">
			<div v-for="line in linesCopy" :key="line" class="line">{{ line }}</div>
		</pre>
		<!-- <widget-copy :text="copyText"></widget-copy> -->
	</div>
</template>
<template id="panel-xss">
	<div class="panel-xss" @copy="copyEvent">
		<div v-html="html" class="html"></div>
		<!-- <widget-copy :text="html"></widget-copy> -->

</template>
<template id="widget-button">

	<div class="widget-copy" title="Copy to clipboard" @click="copyText"><span style="font-size: .875em; margin-right: .125em; position: relative; top: -.25em; left: -.125em">📄<span style="position: absolute; top: .25em; left: .25em">📄</span></span></div>

</div>

<script>
"use strict"

var AppConInput = {
	name: 'app-coninput',
	template: '#app-coninput',
	data() {
		return {
			input: "",
			history: [],
			historyIndex: 0,
		};
	},
	props: ['disabled'],
	methods: {
		submit() {
			let text = this.input;
			this.$emit('submit', text);
			this.input = "";
			this.history.push(text);
			this.historyIndex = this.history.length;
		},
		historyNav(dir) {
			let index = this.historyIndex + dir;
			index = Math.min(index, this.history.length);
			index = Math.max(index, 0);
			if (index != this.historyIndex) {
				if (index >= 0 && index < this.history.length) {
					this.input = this.history[index];
				}
				else {
					this.input = "";
				}
				this.historyIndex = index;
			}
		},
		clear() {
			this.$emit('clear');
		},
		exit() {
			this.$emit('submit', "exit!");
		},
	},
};
</script>
<script>
"use strict"

let SOCKET = null;

function argv() {
	let result = {};
	for (var arg of window.location.hash.substring(1).split("&")) {
		let pos = arg.indexOf("=");
		if (pos >= 0) {
			result[arg.substring(0, pos)] = decodeURIComponent(arg.substring(pos + 1));
		}
	}
	return result;
}

var MAX_CONSOLE_LINES = 10000;

var AppMain = {
	name: 'app-main',
	data() {
		return {
			// Connection information
			conn: {
				address: "ws://localhost:28912/",
				error: null,
				paused: false,
				ready: false,
			},
			// WebSocket instance, null if disconnected
			socket: null,
			// Current page being shown
			currentPage: "Console",
			// Page content
			pages: {},
			// Console
			consoleLines: [],
		};
	},
	computed: {
		pageTitles() {
			let keys = Object.keys(this.pages).sort();
			return ["Console", ...keys];
		},
	},
	methods: {
		connect() {
			this.conn.error = null;
			this.conn.paused = false;
			this.conn.ready = false;

			if (this.socket) {
				this.disconnect(null);
			}

			// Move the window location to reflect the connection address
			window.location.hash = "address=" + encodeURIComponent(this.conn.address);

			let sock = new WebSocket(this.conn.address);
			this.socket = window.SOCKET = sock;
			sock.onopen = e => {
				this.conn.ready = true;
				this.clear();
			};
			sock.onmessage = e => {
				try {
					if (e.data.startsWith("{")) {
						let data = JSON.parse(e.data);
						switch (data.target) {
							case 'console/log':
								this.consoleLog("" + data.message);
								break;
							case 'debug/write':
								this.writePage(data.message.scope, data.message.content);
								break;
							default:
								console.log(data.target, data.message);
								break;
						}
					}
					else {
						let [line, text] = a.data.split("\n", 2);
						if (!this.conn.paused) {
							this.pages[line] = "" + text;
						}
					}
				}
				catch (ex) {
					console.error(ex);
				}
			};
			sock.onclose = e => {
				this.disconnect(null);
			}
			sock.onerror = ex => {
				this.conn.error = "Can't establish a connection to the server.";
				console.error(ex);
				this.disconnect(ex);
			};
		},
		disconnect() {
			if (this.socket) {
				this.socket.close();
				this.socket = window.SOCKET = null;
			}
			this.conn.ready = false;
		},
		writePage(scope, content) {
			if (!this.conn.paused) {
				this.pages[scope] = "" + content;
			}
			window.PAGES = this.pages;
		},
		// Clears the pages and console
		clear() {
			this.pages = {};
			this.consoleLines = [];
		},
		changeCurrentPage(page) {
			this.currentPage = page;
		},
		consoleInput(text) {
			if (this.socket) {
				this.consoleLines.push("> " + text);
				this.socket.send(text);
			}
			else {
				this.consoleLines.push("Please connect to the host first.");
			}
		},
		consoleClear() {
			this.consoleLines = [];
		},
		consoleLog(line) {
			this.consoleLines.push(line);
			if (this.consoleLines.length > (MAX_CONSOLE_LINES + 100)) {
				this.consoleLines = this.consoleLines.slice(this.consoleLines.length - MAX_CONSOLE_LINES)
			}
		},
		sendCmd(cmd) {
			if (this.socket) {
				this.socket.send(cmd);
			}
		},
	},
	mounted() {
		let args = argv();
		if ('address' in args) {
			this.conn.address = args.address;
		}
	},
	template: '#app-main',
};
</script>
<script>
"use strict"

var AppSidebar = {
	name: 'app-sidebar',
	template: '#app-sidebar',

	data() {
		return {
			selectedTopic: null,
		};
	},
	props: ['topics'],
	watch: {
		topics() {
			if (!this.topics.includes(this.selectedTopic)) {
				this.selectedTopic = null;
			}
		}
	},
	methods: {
		selectTopic(topic) {
			this.selectedTopic = topic;
			this.$emit('select-topic', topic);
		},
	},
};

<script>
"use strict"

var PanelConsole = {
	name: 'panel-console',
	template: '#panel-console',

	data() {
		return {
			scrollOncePerTick: true,
		};
	},
	props: ['lines'],
	computed: {
		linesCopy() {
			return this.lines.slice();
		},
		copyText() {
			return this.lines.join("\n");
		},
	},
	watch: {
		linesCopy() {
			this.scrollToEnd(false);
		},
	},
	methods: {
		scrollToEnd(force) {
			if (this.scrollOncePerTick) {
				let el = this.$refs.consoleRef;
				// From StackOverflow: Scroll to the bottom only if we're already at the bottom
				if (force || el.scrollHeight - el.scrollTop - el.clientHeight < 1) {
					this.scrollOncePerTick = false;
					Vue.nextTick(() => {
						el.scrollTop = el.scrollHeight;
						this.scrollOncePerTick = true;
					});
				}
			}
		},
		copyEvent(e) {
			if (document.getSelection().toString() == "") {
				e.clipboardData.setData("text/plain", this.copyText);
				e.preventDefault();
			}
		},
	},
	mounted() {
		this.scrollToEnd(true);
	},
};
</script>
<script>

	methods: {
		copyText() {
			window.navigator.clipboard.writeText(this.html);
